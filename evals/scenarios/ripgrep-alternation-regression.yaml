name: ripgrep-alternation-regression
models:
  - google/gemini-3.1-flash-lite-preview
  - zai-coding/glm-4.5-air
  - zai-coding/glm-5-turbo
repository:
  url: https://github.com/BurntSushi/ripgrep
  commit: 6c5108ed17987531644518fac8c1659b0b202611
  fix_commit: 9d738ad0c009e6632d75fa3d36051e5ae7f7cce6
prompt: >
  Case-insensitive alternation patterns like 'foo|bar' with -i produce false
  negatives due to a regression in inner literal extraction. Investigate the regex
  crate's literal extraction and fix it. Check if there are other pattern types
  affected by the same literal extraction bug and fix them too. Then run the regex
  crate tests to confirm the fix.
validation_rules:
  - type: command_succeeds
    command: cargo test -p regex
timeout_seconds: 600
