name: attrs-cached-property-slots
complexity: medium
models:
  - zai-coding/glm-5.1
  - google/gemini-3.1-pro-preview
  - zai-coding/glm-4.5-air
repository:
  url: https://github.com/python-attrs/attrs
  commit: 82a14627fddbd0b2d802fbc574fa3b1ef010a801
  fix_commit: 88e2896ca9351cd48711bd320571a832ae122cd5
turns:
  - "An AttributeError inside a cached_property is silently swallowed when the class
     uses slots=True. The error is misinterpreted as the attribute not being set yet.
     Fix the cached_property implementation to distinguish between an unset attribute
     and one that raises during computation."
  - "Run the slots tests to confirm."
validation_rules:
  - type: command_succeeds
    command: pytest tests/test_slots.py
timeout_seconds: 300
