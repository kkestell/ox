name: click-semver-default
models:
  - google/gemini-3.1-flash-lite-preview
  - zai-coding/glm-4.5-air
  - zai-coding/glm-5-turbo
repository:
  url: https://github.com/pallets/click
  commit: 04ef3a6f473deb2499721a8d11f92a7d2c0912f2
  fix_commit: 1458800409ed12076f18451889b0857db36aa522
setup_commands:
  - python3 -m pip install --break-system-packages -e . pytest semver
prompt: >
  Using a semver.Version instance as a Click option default raises an exception when
  generating help text. Investigate and fix it, then run the tests to confirm the fix
  is complete.
validation_rules:
  - type: command_succeeds
    command: pytest tests/test_options.py
timeout_seconds: 300
