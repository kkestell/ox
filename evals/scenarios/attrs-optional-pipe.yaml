name: attrs-optional-pipe
models:
  - google/gemini-3.1-flash-lite-preview
  - zai-coding/glm-4.5-air
  - zai-coding/glm-5-turbo
repository:
  url: https://github.com/python-attrs/attrs
  commit: ee0f19b696c60064c58cdc08b3265aef56d49ff8
  fix_commit: e21793e90a25c7ea47a9c0369150067cc8322de0
prompt: >
  converters.optional(converters.pipe(...)) raises because optional doesn't accept
  Converter instances, only plain callables. Fix optional so it works with pipe
  converters. Then run the converter tests to confirm.
validation_rules:
  - type: command_succeeds
    command: pytest tests/test_converters.py
timeout_seconds: 300
